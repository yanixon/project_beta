<!DOCTYPE html>
<html>
<head>
    <title>Notes</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #f0f0f0; }
        h1 { color: #34495e; }
        .note { padding: 15px; margin: 10px 0; border-radius: 8px; }
        .note.yellow { background: #ffeaa7; }
        .note.blue { background: #74b9ff; }
        .note.green { background: #55efc4; }
        .pin { font-size: 14px; float: right; }
        .meta { color: #636e72; font-size: 13px; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>Notes</h1>
    <p>{{ notes|length }} notes</p>
    {% for note in notes %}
    <div class="note {{ note.color }}">
        {% if note.pinned %}<span class="pin">Pinned</span>{% endif %}
        <strong>{{ note.title }}</strong>
        <div class="meta">{{ note.notebook.name }} &middot; {{ note.created_at|date:"M d, Y" }}</div>
        {% if note.content %}<p>{{ note.content }}</p>{% endif %}
    </div>
    {% empty %}
    <p>No notes yet.</p>
    {% endfor %}
</body>
</html>
